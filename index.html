<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Fistiks Wishlist</title>


    <style>
        :root {
            --bg: #faf8f5;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-light: #8a8a8a;
            --accent: #e07a5f;
            --accent-hover: #c9684f;
            --accent-light: #fdf0ec;
            --green: #4caf7d;
            --green-hover: #3d9468;
            --border: #e8e4df;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --radius: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 20px 100px 20px;
        }

        /*
            HEADER
        */
        header {
            padding: 60px 0 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .count {
            display: inline-block;
            background: var(--accent);
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            vertical-align: middle;
        }

        header p {
            color: var(--text-light);
            font-size: 15px;
            margin-top: 4px;
        }

        .history-link {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 0;
            margin-top: 8px;
            white-space: nowrap;
        }

        .history-link:hover {
            color: var(--accent-hover);
        }

        /* ---- COMPLETE BAR ---- */
        .complete-bar {
            position: fixed;
            bottom: 68px;
            left: 20px;
            right: 20px;
            display: none;
            gap: 10px;
            animation: slideIn 0.2s ease-out;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .complete-bar.visible {
            display: flex;
        }

        .complete-btn {
            flex: 1;
            padding: 14px 20px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .complete-btn:hover {
            background: var(--green-hover);
        }

        .deselect-btn {
            padding: 14px 16px;
            background: var(--card-bg);
            color: var(--text-light);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .deselect-btn:hover {
            border-color: var(--text-light);
            color: var(--text);
        }

        .history-item.delete-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
            opacity: 0.4;
            transition: opacity 0.2s ease, color 0.2s ease;
        }
        .history-item .delete-btn:hover {
            opacity: 1;
            color: #d44;
        }
        /* ---- WISHLIST ITEMS ---- */
        .wishlist {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .wish-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
            border: 2px solid transparent;
            transition: border-color 0.2s ease, background 0.2s ease;
            cursor: pointer;
        }

        .wish-item.selected {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wish-item .select-btn {
            width: 26px;
            height: 26px;
            min-width: 26px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: none;
            cursor: pointer;
            margin-top: 1px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: transparent;
        }

        .wish-item.selected .select-btn {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
        }

        .wish-item .wish-text {
            flex: 1;
        }

        .wish-item .wish-text h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .wish-item .delete-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
            opacity: 0.4;
            transition: opacity 0.2s ease, color 0.2s ease;
        }

        .wish-item .delete-btn:hover {
            opacity: 1;
            color: #d44;
        }

        /* ---- INPUT BAR ---- */
        .input-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 10px;
        }

        .input-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-bar input:focus {
            border-color: var(--accent);
        }

        .input-bar button {
            padding: 12px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .input-bar button:hover {
            background: var(--accent-hover);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .history-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .history-item .done-icon {
            width: 26px;
            height: 26px;
            min-width: 26px;
            border-radius: 50%;
            background: var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            margin-top: 1px;
        }

        .history-item .wish-text h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-light);
        }

        .history-item .wish-text p {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 3px;
        }

        .history-item .wish-text {
            flex: 1;
        }

        .history-item .restore-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            white-space: nowrap;
            transition: opacity 0.2s ease;
        }

        .history-item .restore-btn:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>


    <header>
        <div>
            <h1>
                <span id="page-title">Fistik Wishlist</span>
                <span class="count" id="item-count">0</span>
            </h1>
            <p id="page-subtitle">Things to remember</p>
        </div>
        <button class="history-link" id="history-link">History</button>
    </header>

    <div class="wishlist" id="wishlist"></div>

    <!-- Complete bar — hidden by default, shown when items are selected -->
    <div class="complete-bar" id="complete-bar">
        <button class="complete-btn" id="complete-btn">Complete Selected</button>
        <button class="deselect-btn" id="deselect-btn">Cancel</button>
    </div>

    <div class="input-bar" id="input-bar">
        <input type="text" id="wish-input" placeholder="Add a wish..." autocomplete="off">
        <button id="add-btn">Add</button>
    </div>

    <script>


        const wishInput = document.getElementById('wish-input');
        const addBtn = document.getElementById('add-btn');
        const wishlistEl = document.getElementById('wishlist');
        const itemCount = document.getElementById('item-count');
        const completeBar = document.getElementById('complete-bar');
        const completeBtn = document.getElementById('complete-btn');
        const deselectBtn = document.getElementById('deselect-btn');
        const historyLink = document.getElementById('history-link');
        const pageTitle = document.getElementById('page-title');
        const pageSubtitle = document.getElementById('page-subtitle');
        const inputBar = document.getElementById('input-bar');


        let wishes = JSON.parse(localStorage.getItem('wishes')) || [];
        let completed = JSON.parse(localStorage.getItem('completed')) || [];
        let currentView = 'wishlist';

        function saveWishes() {
            localStorage.setItem('wishes', JSON.stringify(wishes));
        }

        function saveCompleted() {
            localStorage.setItem('completed', JSON.stringify(completed));
        }

        
        function renderWishes() {
            wishlistEl.innerHTML = '';
            const selectedCount = wishes.filter(function(w) {
                return w.selected;
            }).length;
            itemCount.textContent = wishes.length;

            if (selectedCount > 0) {
                completeBar.classList.add('visible');
                completeBtn.textContent = 'Complete Selected (' + selectedCount + ')';
            } else {
                completeBar.classList.remove('visible');
            }
          
            if (wishes.length === 0) {
                wishlistEl.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">✨</div>
                        <p>Your wishlist is empty.<br>Add something you'd love!</p>
                    </div>
                `;
                return;
                
            }

            
            wishes.forEach(function(wish, index) {
                const item = document.createElement('div');
                item.className = 'wish-item' + (wish.selected ? ' selected' : '');
              
                item.innerHTML = `
                    <button class="select-btn" title="Mark as done"></button>
                    <div class="wish-text">
                        <h3>${wish.text}</h3>
                        ${wish.note ? '<p>' + wish.note + '</p>' : ''}
                    </div>
                    <button class="delete-btn" title="Remove">&times;</button>
                `;

                item.querySelector('.select-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    wishes[index].selected = !wishes[index].selected;
                    saveWishes();
                    renderWishes();
                });

                item.addEventListener('click', function() {
                    wishes[index].selected = !wishes[index].selected;
                    saveWishes();
                    renderWishes();
                });

                item.querySelector('.delete-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    wishes.splice(index, 1);
                    saveWishes();
                    renderWishes();
                });

                wishlistEl.appendChild(item);
            });
        }

        function renderHistory() {
            wishlistEl.innerHTML = '';
            itemCount.textContent = completed.length;

            if (completed.length === 0) {
                wishlistEl.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📭</div>
                        <p>No completed wishes yet.<br>Get after it!</p>
                    </div>
                `;
                return;
            }

            completed.forEach(function(wish, index) {
                const item = document.createElement('div');
                item.className = 'history-item';

                item.innerHTML = `
                    <div class="done-icon">✓</div>
                    <div class="wish-text">
                        <h3>${wish.text}</h3>
                        <p>Completed ${wish.completedDate}</p>
                    </div>
                    <button class="restore-btn">Restore</button>
                    <button class="delete-btn" title="Remove">&times;</button>
                `;

                item.querySelector('.restore-btn').addEventListener('click', function() {
                    const restored = completed.splice(index, 1)[0];
                    wishes.unshift({
                        text: restored.text,
                        selected: false
                    });
                    saveWishes();
                    saveCompleted();
                    renderHistory();
                });
                item.querySelector('.delete-btn').addEventListener('click', function() {
                    completed.splice(index, 1);
                    saveCompleted();
                    renderHistory();
                });

                wishlistEl.appendChild(item);
            });
        }

        function switchView(view) {
            currentView = view;

            if (view === 'history') {
                pageTitle.textContent = 'History';
                pageSubtitle.textContent = 'Wishes you\'ve completed';
                historyLink.textContent = '\u2190 Back';
                inputBar.style.display = 'none';
                completeBar.classList.remove('visible');
                renderHistory();
            } else {
                pageTitle.textContent = 'Fistik Wishlist';
                pageSubtitle.textContent = 'Things I want to remember';
                historyLink.textContent = 'History';
                inputBar.style.display = 'flex';
                renderWishes();
            }
        }

        function addWish() {
            const text = wishInput.value.trim();
            if (text === '') return;

            wishes.unshift({
                text: text,
                note: '',       
                selected : false
            });

            wishInput.value = '';
            saveWishes();
            renderWishes();
        }

        function completeSelected() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });

            const stillActive = [];

            wishes.forEach(function(wish) {
                if (wish.selected) {
                    completed.unshift({
                        text: wish.text,
                        completedDate: dateStr
                    });
                } else {
                    stillActive.push(wish);
                }
            });

            wishes = stillActive;
            saveWishes();
            saveCompleted();
            renderWishes();
        }

        function deselectAll() {
            wishes.forEach(function(wish) {
                wish.selected = false;
            });
            saveWishes();
            renderWishes();
        }

        addBtn.addEventListener('click', addWish);
        wishInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addWish();
        });
        completeBtn.addEventListener('click', completeSelected);
        deselectBtn.addEventListener('click', deselectAll);
        historyLink.addEventListener('click', function() {
            switchView(currentView === 'wishlist' ? 'history' : 'wishlist');
        });

        renderWishes();


        /*
            ============================================================
            CONGRATULATIONS! You now understand the basics of:

            1. HTML  — Structuring content (<div>, <button>, <input>)
            2. CSS   — Styling it (colors, spacing, animations)
            3. JS    — Making it interactive (events, functions, data)

            THINGS TO TRY NEXT (exercises!):
            --------------------------------------------------------
            Easy:
            - Change the accent colour (find --accent in the CSS)
            - Change the emoji in the empty state
            - Change the placeholder text in the input

            Medium:
            - Add a "notes" field (a second input for each wish)
            - Add categories (e.g. "Tech", "Books", "Travel")
            - Add a price/cost field

            Harder:
            - Add the ability to edit an existing wish
            - Add drag-to-reorder
            - Add a "share" button that copies the list as text

            Have fun and experiment! You can't break anything
            permanently — the worst case is you refresh the page.
            ============================================================
        */
    </script>

</body>
</html>
